<header class="site-header" id="home">
    <div class="brand">
        <a href="{{ url_for('index') }}" class="brand-link">NetMan AI</a>
    </div>
    <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ url_for('index') }}#home">Home</a>
        <a href="{{ url_for('index') }}#about">About</a>
        <a href="{{ url_for('index') }}#features">Features</a>
        <a href="{{ url_for('index') }}#how-it-works">How It Works</a>
        <a href="{{ url_for('index') }}#contact">Contact</a>
    </nav>
    <div class="header-actions">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="btn btn-ghost">Log Out</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-secondary">Login</a>
            <a href="{{ url_for('signup') }}" class="btn btn-primary">Sign Up</a>
        {% endif %}
    </div>
</header>
