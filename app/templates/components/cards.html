{% macro feature_highlight(icon, title, text) -%}
<article class="highlight-card">
    <div class="icon-badge">{{ icon }}</div>
    <h3>{{ title }}</h3>
    <p>{{ text }}</p>
</article>
{%- endmacro %}

{% macro feature_item(title, text) -%}
<article class="feature-card">
    <h3>{{ title }}</h3>
    <p>{{ text }}</p>
</article>
{%- endmacro %}
