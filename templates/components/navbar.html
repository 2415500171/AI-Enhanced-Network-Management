{% load static %}
<header class="site-header" id="home">
    <div class="brand">
        <a href="{% url 'core:index' %}" class="brand-link">NetMan AI</a>
    </div>
    <nav class="site-nav" aria-label="Primary navigation">
        <a href="{% url 'core:index' %}#home">Home</a>
        <a href="{% url 'core:index' %}#about">About</a>
        <a href="{% url 'core:index' %}#features">Features</a>
        <a href="{% url 'core:index' %}#how-it-works">How It Works</a>
        <a href="{% url 'core:index' %}#contact">Contact</a>
    </nav>
    <div class="header-actions">
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard:home' %}" class="btn btn-secondary">Dashboard</a>
            <form method="post" action="{% url 'users:logout' %}" style="margin:0;display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-ghost">Log Out</button>
            </form>
        {% else %}
            <a href="{% url 'users:login' %}" class="btn btn-secondary">Login</a>
            <a href="{% url 'users:signup' %}" class="btn btn-primary">Sign Up</a>
        {% endif %}
    </div>
</header>
